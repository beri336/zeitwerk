<!-- index.html -->

<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <meta name="theme-color" content="#01696f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Zeitwerk" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <title>Zeitwerk</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph (WhatsApp, Facebook, Discord, Telegram) -->
    <meta property="og:title" content="Zeitwerk" />
    <meta
      property="og:description"
      content="Deine persönliche Arbeitszeiterfassung – Einträge, Übersichten und Exports auf einen Blick."
    />
    <meta
      property="og:image"
      content="https://zeitwerk-iota.vercel.app/maskable-icon-512x512.png"
    />
    <meta property="og:url" content="https://zeitwerk-iota.vercel.app" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Zeitwerk" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zeitwerk" />
    <meta
      name="twitter:description"
      content="Deine persönliche Arbeitszeiterfassung."
    />
    <meta
      name="twitter:image"
      content="https://zeitwerk-iota.vercel.app/maskable-icon-512x512.png"
    />
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
